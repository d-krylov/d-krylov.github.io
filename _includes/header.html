<nav class="navbar is-dark is-fixed-top" role="navigation" aria-label="main navigation">
    
  <div class="navbar-brand">
    <a class="navbar-item">
      {% if page.layout != 'home' %} <img class="is-rounded" src="{{site.avatar}}"/> {% endif %}
    </a>
  </div>

  <div class="navbar-menu">
    <div class="navbar-end">
      <a class="navbar-item" href="{{site.url}}/about">About</a>
      <a class="navbar-item" href="{{site.url}}/projects">Projects</a>
      <a class="navbar-item" href="{{site.url}}/blog">Blog</a>
      <a class="navbar-item" href="{{site.url}}/engine">Engine</a>
      <a class="navbar-item" href="{{site.url}}/">Home</a>
    </div>
  </div>

</nav>

{% if page.layout == 'home' %}
  <section class="hero is-medium is-dark">
    <div class="hero-body">
      <div class="container has-text-centered">
        <figure class="image image is-inline-block" id="avatar">
          <img class="image is-1by1 is-rounded" src="{{site.avatar}}"/>
        </figure>
        <h1 class = "title mt-5 has-text-white">{{site.title}}</h1>
      </div>
    </div>
  </section>

  <div class="container mt-5 has-text-centered">
    <a href="https://linkedin.com" target="_blank" class="icon is-large"><i class="fab fa-linkedin-in fa-2x"></i></a>
    <a href="https://github.com" target="_blank" class="icon is-large"><i class="fab fa-github fa-2x"></i></a>
    <a href="https://github.com" target="_blank" class="icon is-large"><i class="fa fa-telegram fa-2x"></i></a>
  </div>

{% endif %}

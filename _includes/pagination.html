<div class="container">
  <nav class="pagination" role="navigation" aria-label="pagination">

  {% if paginator.next_page %}
    <a class="pagination-next" href="{{ paginator.next_page_path | prepend: site.baseurl }}">Next</a>
  {% else %}
    <a class="pagination-next" href="#">Next</a>
  {% endif %}



  {% if paginator.previous_page %}
    <a class="pagination-previous" href="{{ paginator.previous_page_path | prepend: site.baseurl }}">Previous</a>
  {% else %}
  <a class="pagination-previous" href="#">Previous</a>
  {% endif %}

  </nav>

</div>
